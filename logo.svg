<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Navy blue rounded square background -->
  <rect width="120" height="120" rx="26" ry="26" fill="#1B3A6B"/>

  <!-- Passport book body (coral/salmon) -->
  <rect x="22" y="38" width="62" height="54" rx="5" ry="5" fill="#E8736A"/>
  <!-- Passport spine -->
  <rect x="22" y="38" width="8" height="54" rx="3" ry="3" fill="#C9524A"/>
  <!-- Passport inner page -->
  <rect x="34" y="46" width="44" height="38" rx="3" ry="3" fill="#fff" opacity="0.92"/>

  <!-- Norwegian royal crest placeholder — crown outline -->
  <g transform="translate(56, 58)">
    <!-- Crown base -->
    <rect x="-9" y="4" width="18" height="5" rx="1" fill="#1B3A6B"/>
    <!-- Crown arches -->
    <polygon points="0,-10 -9,4 9,4" fill="none" stroke="#1B3A6B" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="-4.5" y1="0" x2="-4.5" y2="4" stroke="#1B3A6B" stroke-width="2" stroke-linecap="round"/>
    <line x1="4.5" y1="0" x2="4.5" y2="4" stroke="#1B3A6B" stroke-width="2" stroke-linecap="round"/>
    <!-- Crown jewels -->
    <circle cx="0" cy="-10" r="2" fill="#1B3A6B"/>
    <circle cx="-9" cy="4" r="1.5" fill="#1B3A6B"/>
    <circle cx="9" cy="4" r="1.5" fill="#1B3A6B"/>
  </g>

  <!-- "PASS" text on passport -->
  <text x="56" y="79" text-anchor="middle" font-family="'Arial', sans-serif" font-size="9" font-weight="800" fill="#1B3A6B" letter-spacing="2">PASS</text>

  <!-- White bell above passport (top-left area of icon) -->
  <g transform="translate(30, 34)">
    <!-- Bell body -->
    <path d="M0,-12 C-8,-12 -10,-4 -10,2 L-10,6 L10,6 L10,2 C10,-4 8,-12 0,-12 Z" fill="white"/>
    <!-- Bell clapper -->
    <circle cx="0" cy="9" r="2.5" fill="white"/>
    <!-- Bell top -->
    <rect x="-2" y="-14" width="4" height="3" rx="2" fill="white"/>
  </g>

  <!-- Green checkmark badge (bottom-right) -->
  <circle cx="88" cy="86" r="14" fill="#22C55E"/>
  <polyline points="80,86 85,92 96,80" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
